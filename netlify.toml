[build]
  publish = "."

# No build command needed — pure static site

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

# Cache the jobs data for 10 minutes so browsers don't serve stale files
[[headers]]
  for = "/data/jobs.json"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=300"
