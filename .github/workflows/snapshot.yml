name: Monthly Snapshot

on:
  schedule:
    # Runs at 09:00 UTC on the 1st of every month
    # (after the 06:00 scrape has already updated jobs.json)
    - cron: '0 9 1 * *'
  workflow_dispatch: # manual trigger for testing

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate monthly snapshot
        run: node scripts/snapshot.js

      - name: Commit & push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/
          git diff --staged --quiet \
            && echo "⏭  No new snapshot — skipping commit" \
            || (git commit -m "chore: add monthly snapshot $(date +%Y-%m)" && git push)
