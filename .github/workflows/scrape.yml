name: Scrape Jobs

on:
  schedule:
    # Runs at 06:00 and 18:00 UTC every day (every 12 hours)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Snapshot previous jobs.json (for diff)
        run: |
          mkdir -p /tmp/prev
          if [ -f data/jobs.json ]; then
            cp data/jobs.json /tmp/prev/jobs.json
            echo "Saved previous snapshot ($(wc -c < /tmp/prev/jobs.json) bytes)"
          else
            echo "No previous data/jobs.json — treating all scraped jobs as new"
            echo '{"jobs":[]}' > /tmp/prev/jobs.json
          fi

      - name: Run scrapers
        run: node scripts/scrape.js

      - name: Notify Telegram about new jobs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js /tmp/prev/jobs.json

      - name: Commit & push data/jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet \
            && echo "⏭  No changes — skipping commit" \
            || (git commit -m "chore: update jobs.json" && git push)
