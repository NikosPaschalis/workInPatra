name: Scrape Jobs
on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Use pre-installed Chrome on the runner — skips the 170MB CDN download entirely
      # ubuntu-latest always has google-chrome-stable pre-installed
      - name: Set Chrome executable path
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null \
                || which google-chrome       2>/dev/null \
                || which chromium-browser    2>/dev/null)
          echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$CHROME" >> $GITHUB_ENV
          echo "✅ Using Chrome at: $CHROME"
          $CHROME --version

      # Still needed for system libs (fonts, libgbm, etc.) — fast, no download
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium
        # might need remove
      - name: Link system Chrome as Playwright headless shell
        run: |
          DIR="$HOME/.cache/ms-playwright/chromium_headless_shell-1217/chrome-headless-shell-linux64"
          mkdir -p "$DIR"
          ln -sf /usr/bin/google-chrome-stable "$DIR/chrome-headless-shell"
          echo "✅ Linked: $DIR/chrome-headless-shell"

      
      - name: Snapshot previous jobs.json (for diff)
        run: |
          mkdir -p /tmp/prev
          if [ -f data/jobs.json ]; then
            cp data/jobs.json /tmp/prev/jobs.json
            echo "Saved previous snapshot ($(wc -c < /tmp/prev/jobs.json) bytes)"
          else
            echo "No previous data/jobs.json — treating all scraped jobs as new"
            echo '{"jobs":[]}' > /tmp/prev/jobs.json
          fi

      - name: Random delay (only on scheduled runs)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 90))
          echo "Sleeping ${DELAY}s to break the cron pattern"
          sleep $DELAY

      - name: Run scrapers
        timeout-minutes: 20
        run: node scripts/scrape.js

      - name: Notify Telegram about new jobs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js /tmp/prev/jobs.json

      - name: Commit & push data/jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet \
            && echo "⏭  No changes — skipping commit" \
            || (git commit -m "chore: update jobs.json" && git push)
